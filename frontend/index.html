<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Audio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #fff; color: #000; width: 100%;">
    <h1 style="font-size: 1rem; font-weight: normal; text-align: left; width: 100%; margin: 10px 0 0 20px; color: #777;">Canopy Labs Text-Speech v0.0</h1>

    <div class="input-container" style="position: absolute; bottom: 0; width: 100%; background-color: #fff; display: flex; justify-content: center;">
        <input type="text" class="text-input" id="textInput" placeholder="Type your text here..." style="width: 90%; padding: 15px; font-size: 1rem; border: none; border-radius: 50px; background-color: #f0f0f0; color: #000; outline: none;">
    </div>

    <script>
        let gen_ids = [];

        document.getElementById('textInput').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const prompt = document.getElementById('textInput').value;
                const url = "https://e2a9jg7rwha7y7-8080.proxy.runpod.net/inference";
                const max_length = 100;
                const prepend_tokens = false;

                const payload = {
                    "prompt": prompt,
                    "max_length": max_length,
                    "prepend_tokens": prepend_tokens
                };

                const headers = {
                    "Content-Type": "application/json"
                };

                fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            }
        });

        function convertTextToAudio() {
            const text = document.getElementById('textInput').value;
            if (text) {
                const msg = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
